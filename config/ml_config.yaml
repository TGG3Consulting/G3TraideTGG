# =============================================================================
# ML SYSTEM CONFIGURATION
# =============================================================================
# Все параметры ML системы BinanceFriend
# Не хардкодить значения в коде - брать отсюда!

ml:
  # Включение/выключение ML оптимизации
  enabled: false  # Включить после обучения моделей

  # ==========================================================================
  # DATA COLLECTION
  # ==========================================================================
  data:
    # Исторические данные для обучения
    history_days: 90              # Дней истории для обучения
    min_samples_per_symbol: 1000  # Мин. точек данных на символ

    # Интервалы свечей
    kline_intervals:
      - "1m"
      - "5m"
      - "15m"
      - "1h"
      - "4h"

    # Фильтрация символов
    min_volume_usd_24h: 10000000  # Мин. объём $10M/день
    min_oi_usd: 5000000           # Мин. OI $5M

    # Лимиты запросов
    request_delay_ms: 100         # Задержка между запросами
    max_concurrent_requests: 5    # Параллельных запросов

  # ==========================================================================
  # FEATURE ENGINEERING
  # ==========================================================================
  features:
    # Технические индикаторы
    technical:
      rsi_period: 14
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      bb_period: 20
      bb_std: 2.0
      atr_period: 14
      ema_periods: [9, 21, 50, 200]

    # Временные окна для агрегации
    windows_minutes: [1, 5, 15, 60, 240]

    # Нормализация
    normalize: true
    scaler_type: "robust"  # standard, minmax, robust

    # Выбор фичей
    max_features: 100
    min_importance: 0.01

  # ==========================================================================
  # MODELS
  # ==========================================================================
  models:
    # Директория для сохранения моделей
    save_dir: "models/ml"

    # Интервал перезагрузки моделей (часов)
    reload_interval_hours: 24

    # Direction Classifier (предсказание направления)
    direction:
      model_type: "lightgbm"  # lightgbm, xgboost, catboost
      n_estimators: 500
      max_depth: 8
      learning_rate: 0.05
      min_samples_leaf: 50
      class_weight: "balanced"

    # SL/TP Regressors (предсказание уровней)
    levels:
      model_type: "lightgbm"
      n_estimators: 300
      max_depth: 6
      learning_rate: 0.05

    # Lifetime Regressor (время жизни сигнала)
    lifetime:
      model_type: "lightgbm"
      n_estimators: 200
      max_depth: 5
      learning_rate: 0.05

    # Confidence Calibrator
    confidence:
      calibration_method: "isotonic"  # isotonic, platt
      cv_folds: 5

  # ==========================================================================
  # TRAINING
  # ==========================================================================
  training:
    # Разбиение данных
    test_size: 0.2
    validation_size: 0.1
    shuffle: false  # Для временных рядов - нет shuffle!

    # Cross-validation
    cv_type: "time_series"  # time_series, walk_forward
    cv_folds: 5

    # Early stopping
    early_stopping_rounds: 50

    # Переобучение
    retrain_interval_days: 7    # Переобучать каждые N дней
    min_new_samples: 500        # Мин. новых данных для переобучения

  # ==========================================================================
  # OPTIMIZATION (применение к сигналам)
  # ==========================================================================
  optimization:
    # Минимальная уверенность для оптимизации
    min_confidence: 0.6

    # Максимальные изменения от оригинальных значений
    max_sl_adjustment_pct: 30    # Макс. изменение SL ±30%
    max_tp_adjustment_pct: 50    # Макс. изменение TP ±50%
    max_entry_adjustment_pct: 5  # Макс. изменение entry ±5%

    # Фильтрация сигналов
    min_predicted_winrate: 0.55  # Мин. предсказанный winrate
    min_predicted_rr: 1.5        # Мин. предсказанный R:R

    # Cooldown после сигнала на тот же символ
    symbol_cooldown_minutes: 15

  # ==========================================================================
  # RISK MANAGEMENT
  # ==========================================================================
  risk:
    # Position sizing
    position_sizing_method: "kelly"  # fixed, kelly, volatility

    # Kelly criterion параметры
    kelly_fraction: 0.25       # Использовать 25% от Kelly
    max_position_pct: 5.0      # Макс. размер позиции 5% от депозита
    min_position_pct: 0.5      # Мин. размер позиции 0.5%

    # Лимиты
    max_daily_trades: 20       # Макс. сделок в день
    max_open_positions: 5      # Макс. открытых позиций
    max_daily_loss_pct: 10.0   # Макс. дневной убыток 10%
    max_drawdown_pct: 20.0     # Макс. просадка 20%

    # Корреляция позиций
    max_correlated_positions: 3  # Макс. коррелированных позиций
    correlation_threshold: 0.7   # Порог корреляции

  # ==========================================================================
  # METRICS & EVALUATION
  # ==========================================================================
  metrics:
    # Метрики для оптимизации
    primary_metric: "sharpe_ratio"  # sharpe_ratio, profit_factor, win_rate

    # Пороги для валидации модели
    min_sharpe_ratio: 1.0
    min_profit_factor: 1.3
    min_win_rate: 0.5
    max_max_drawdown: 0.25

    # Метрики для логирования
    track_metrics:
      - "win_rate"
      - "profit_factor"
      - "sharpe_ratio"
      - "max_drawdown"
      - "avg_trade_pnl"
      - "trades_per_day"

  # ==========================================================================
  # MONITORING (production monitoring)
  # ==========================================================================
  monitoring:
    # Baseline для определения drift
    baseline_accuracy: 0.55       # Мин. точность для использования ML
    baseline_sharpe: 0.5          # Мин. Sharpe для использования ML

    # Drift detection
    drift_check_window: 100       # Окно для проверки drift (кол-во сигналов)
    max_accuracy_drop: 0.15       # Макс. падение accuracy перед fallback

    # Tail risk thresholds
    max_price_change_24h_pct: 30  # Макс. изменение цены за 24ч
    max_volume_spike_ratio: 10    # Макс. объём spike
    extreme_funding_rate: 0.1     # Экстремальный funding rate

    # Alert thresholds
    consecutive_losses_alert: 5   # Алерт после N убыточных сигналов
    daily_loss_alert_pct: 5       # Алерт при дневном убытке

  # ==========================================================================
  # MARKET REGIME
  # ==========================================================================
  market_regime:
    # Параметры определения режима рынка
    trend_strength_threshold: 0.02  # Мин. движение для тренда
    volatility_high_threshold: 3.0  # Множитель ATR для high volatility
    capitulation_threshold: -0.15   # Падение для определения capitulation
    btc_reference_symbol: "BTCUSDT" # Символ для определения режима
