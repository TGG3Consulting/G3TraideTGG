# =============================================================================
# CROSS-EXCHANGE DETECTION
# =============================================================================
# Настройки для кросс-биржевых детекторов манипуляций
# =============================================================================
cross_exchange:

  # ---------------------------------------------------------------------------
  # PRICE DIVERGENCE (расхождение цен между биржами)
  # Когда цена на одной бирже сильно отличается от других
  # ---------------------------------------------------------------------------
  price_divergence:
    # Пороги (% разницы между биржами)
    threshold_low: 0.1        # 0.1% — слабое расхождение
    threshold_medium: 0.3     # 0.3% — заметное
    threshold_high: 0.5       # 0.5% — сильное
    threshold_critical: 1.0   # 1.0% — арбитраж / манипуляция

  # ---------------------------------------------------------------------------
  # FUNDING ARBITRAGE (арбитраж на funding rate)
  # Когда funding сильно отличается между биржами
  # ---------------------------------------------------------------------------
  funding_arbitrage:
    # Пороги (% разницы в funding между биржами)
    threshold_low: 0.01       # 0.01% spread
    threshold_medium: 0.03    # 0.03% — заметная возможность
    threshold_high: 0.05      # 0.05% — хорошая возможность
    threshold_critical: 0.1   # 0.1% — exceptional

  # ---------------------------------------------------------------------------
  # OI DIVERGENCE (расхождение Open Interest)
  # Когда OI растёт на одной бирже, но не на других
  # ---------------------------------------------------------------------------
  oi_divergence:
    # Пороги (% разницы в изменении OI)
    threshold_low: 5          # 5% разница в изменении OI
    threshold_medium: 10      # 10%
    threshold_high: 20        # 20%
    threshold_critical: 30    # 30% — явная whale activity

  # ---------------------------------------------------------------------------
  # VOLUME CORRELATION (корреляция объёмов)
  # Для детекции wash trading
  # ---------------------------------------------------------------------------
  volume_correlation:
    # Коэффициент корреляции (0-1)
    suspicious_threshold: 0.95   # r > 0.95 подозрительно
    # Минимум точек для анализа
    min_data_points: 60          # 1 час данных

  # ---------------------------------------------------------------------------
  # LEAD-LAG DETECTION
  # Когда одна биржа движется раньше другой
  # ---------------------------------------------------------------------------
  lead_lag:
    min_lag_seconds: 0.5     # Минимальный лаг
    max_lag_seconds: 30.0    # Максимальный лаг
    min_samples: 10          # Минимум точек для подтверждения

  # ---------------------------------------------------------------------------
  # CX-005: LIQUIDITY HUNT (охота за ликвидациями)
  # Детекция манипулятивных движений для запуска каскада ликвидаций
  # ---------------------------------------------------------------------------
  liquidity_hunt:
    enabled: true
    dedup_seconds: 30

    # Пороги движения цены
    price_drop_threshold: 0.02    # 2% падение
    price_spike_threshold: 0.02   # 2% рост

    # Детекция восстановления (V-образный паттерн)
    recovery_window_sec: 300      # 5 минут окно для восстановления
    recovery_threshold: 0.5       # 50% восстановление

    # Пороги алертов по движению цены
    warning_threshold: 0.02       # 2% движение
    alert_threshold: 0.03         # 3% движение
    critical_threshold: 0.05      # 5% движение

    # Перекос стакана перед хантом
    imbalance_threshold: 0.7      # 70% перекос

  # ---------------------------------------------------------------------------
  # CX-006: SPOOFING CROSS (кросс-биржевой спуфинг)
  # Фейковые стены на одной бирже, реальное исполнение на другой
  # ---------------------------------------------------------------------------
  spoofing_cross:
    enabled: true
    dedup_seconds: 30

    # Порог перекоса стакана (фейковая стена)
    imbalance_threshold: 0.80     # 80% на одной стороне

    # Порог всплеска объёма на другой бирже
    volume_spike_threshold: 5.0   # 5x от ожидаемого

    # Время жизни стены (если исчезает быстро = спуф)
    wall_lifetime_sec: 30         # 30 секунд

    # Пороги алертов по confidence score
    warning_threshold: 0.5
    alert_threshold: 0.7
    critical_threshold: 0.85

  # ---------------------------------------------------------------------------
  # ORCHESTRATOR (оркестратор детекторов)
  # ---------------------------------------------------------------------------
  orchestrator:
    # Включить/выключить отдельные детекторы
    enable_price_divergence: true
    enable_volume_correlation: true
    enable_funding_arbitrage: true
    enable_oi_migration: true
    enable_liquidity_hunt: true
    enable_spoofing_cross: true

    # Параллельный анализ
    parallel_analysis: true
    max_concurrent_symbols: 50

    # Минимальный уровень severity для результатов
    min_severity: "WARNING"  # INFO, WARNING, ALERT, CRITICAL

  # ---------------------------------------------------------------------------
  # ОБЩИЕ НАСТРОЙКИ
  # ---------------------------------------------------------------------------
  general:
    # Минимум бирж для кросс-биржевого анализа
    min_exchanges: 2
    # Максимальный возраст данных (секунды)
    max_data_age_sec: 60
    # Интервал проверки (секунды)
    check_interval_sec: 5


# =============================================================================
# ЗАГРУЗКА ИСТОРИЧЕСКИХ ДАННЫХ ПРИ СТАРТЕ
# =============================================================================
#
# Без истории детекторы "слепы" первые 5-60 минут:
# - Volume spikes: нет baseline для сравнения
# - OI divergence: нет данных за час
# - Funding gradient: нет истории за 24-72ч
#
# Эта секция позволяет загрузить историю при старте.
#
# =============================================================================
history:

  # ---------------------------------------------------------------------------
  # ГЛАВНЫЙ ВЫКЛЮЧАТЕЛЬ
  # ---------------------------------------------------------------------------
  enabled: true

  # ---------------------------------------------------------------------------
  # ПАРАЛЛЕЛЬНОСТЬ И RATE LIMITS
  # ---------------------------------------------------------------------------

  # Сколько запросов делать параллельно
  # Больше = быстрее, но риск rate limit
  parallel_requests: 10

  # Задержка между запросами (миллисекунды)
  # Binance: 1200 req/min = 50ms минимум, ставим 100ms для безопасности
  rate_limit_delay_ms: 100

  # Таймаут на один запрос (секунды)
  request_timeout_sec: 15

  # ---------------------------------------------------------------------------
  # KLINES (свечи) — для avg_volume baseline
  # ---------------------------------------------------------------------------
  klines:
    enabled: true
    hours: 2                   # Часов истории (2ч = 120 свечей по 1мин)
    interval: "1m"             # Интервал свечей

  # ---------------------------------------------------------------------------
  # FUNDING RATE HISTORY — для gradient детектора
  # ---------------------------------------------------------------------------
  funding:
    enabled: true
    hours: 72                  # 72 часа = 9 периодов funding (каждые 8ч)
    # API Binance: /fapi/v1/fundingRate?limit=9

  # ---------------------------------------------------------------------------
  # OPEN INTEREST HISTORY — для oi_change детектора
  # ---------------------------------------------------------------------------
  oi:
    enabled: true
    hours: 2                   # 2 часа истории
    period: "5m"               # Период агрегации (5m = 24 точки за 2 часа)
    # API Binance: /futures/data/openInterestHist?period=5m&limit=24

  # ---------------------------------------------------------------------------
  # TRADES (сделки) — для wash trading детектора и buy/sell ratio
  # ---------------------------------------------------------------------------
  trades:
    enabled: true              # ВКЛЮЧЕНО для корректного buy/sell ratio
    minutes: 5                 # 5 минут истории (достаточно для паттернов)
    # API Binance: /fapi/v1/aggTrades?limit=1000

  # ---------------------------------------------------------------------------
  # CROSS-EXCHANGE — загрузка с других бирж
  # ---------------------------------------------------------------------------
  cross_exchange:
    enabled: true
    # Загружать историю только для этих бирж
    exchanges:
      - binance
      - bybit
      - okx
    hours: 1                   # Меньше чем основная (экономия времени)

# =============================================================================
# TRADING SIGNALS — генерация торговых сигналов из детекций
# =============================================================================
signals:

  # ---------------------------------------------------------------------------
  # ОБЩИЕ НАСТРОЙКИ
  # ---------------------------------------------------------------------------
  enabled: true

  # Минимальные пороги для генерации сигнала
  min_accumulation_score: 65   # Мин скор накопления
  min_probability: 60          # Мин вероятность успеха

  # ---------------------------------------------------------------------------
  # УРОВНИ УВЕРЕННОСТИ
  # ---------------------------------------------------------------------------
  confidence_low: 50           # <50 = LOW
  confidence_medium: 65        # 50-65 = MEDIUM
  confidence_high: 80          # 65-80 = HIGH
  confidence_very_high: 90     # >90 = VERY HIGH

  # ---------------------------------------------------------------------------
  # РИСК-МЕНЕДЖМЕНТ
  # ---------------------------------------------------------------------------
  default_sl_pct: 7.0          # Дефолтный стоп-лосс %
  min_risk_reward: 2.0         # Мин R:R для сигнала

  # Take Profit уровни (множители от риска)
  tp1_ratio: 1.5               # TP1 = 1.5x риска
  tp2_ratio: 3.0               # TP2 = 3x риска
  tp3_ratio: 5.0               # TP3 = 5x риска

  # Порции для закрытия
  tp1_portion: 30              # 30% на TP1
  tp2_portion: 40              # 40% на TP2
  tp3_portion: 30              # 30% на TP3

  # ---------------------------------------------------------------------------
  # ВРЕМЯ ДЕЙСТВИЯ
  # ---------------------------------------------------------------------------
  default_valid_hours: 24      # Сколько часов сигнал валиден

  # ---------------------------------------------------------------------------
  # ПОРОГИ ДЛЯ НАКОПЛЕНИЯ
  # ---------------------------------------------------------------------------
  oi_growth_min: 5.0           # Мин рост OI для сигнала
  oi_growth_strong: 15.0       # Сильный рост OI (бонус)

  funding_cheap_threshold: -0.01   # Funding < -0.01% = лонги дешёвые
  funding_extreme_threshold: 0.05  # Funding > 0.05% = экстремально

  crowd_short_threshold: 55.0  # >55% шортов = bearish crowd
  crowd_extreme_short: 60.0    # >60% = очень bearish (squeeze setup)
