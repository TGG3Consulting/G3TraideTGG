# =============================================================================
# BinanceFriend — Конфигурация системы
# =============================================================================
#
# Это ГЛАВНЫЙ ФАЙЛ НАСТРОЕК системы детекции манипуляций.
#
# Как использовать:
#   1. Измени нужные значения в этом файле
#   2. Сохрани файл
#   3. Перезапусти screener — изменения применятся автоматически
#
# Не нужно перекомпилировать код — всё работает "на лету"!
#
# =============================================================================


# =============================================================================
# ДЕТЕКЦИЯ НА СПОТЕ (анализ трейдов, стакана, объёмов)
# =============================================================================
spot:

  # ---------------------------------------------------------------------------
  # ВСПЛЕСКИ ОБЪЁМА
  # Если текущий объём превышает средний в N раз — это сигнал
  # ---------------------------------------------------------------------------

  # Ранний сигнал: объём вырос в 5 раз от среднего
  # Означает: что-то начинается, стоит обратить внимание
  volume_spike_warning: 5.0

  # Активная фаза: объём вырос в 12 раз
  # Означает: идёт активная торговля, возможно манипуляция
  volume_spike_alert: 12.0

  # Экстремальный всплеск: объём вырос в 25 раз
  # Означает: почти наверняка памп или дамп прямо сейчас
  volume_spike_critical: 25.0

  # ---------------------------------------------------------------------------
  # СКОРОСТЬ ИЗМЕНЕНИЯ ЦЕНЫ
  # Как быстро цена движется — слишком быстро = подозрительно
  # ---------------------------------------------------------------------------

  # Цена изменилась на 5% за 1 минуту — это очень быстро
  price_velocity_1m_alert: 5.0

  # Цена изменилась на 10% за 5 минут — значительное движение
  price_velocity_5m_alert: 10.0

  # Цена изменилась на 25% за 5 минут — экстремальное движение (памп/дамп)
  price_velocity_5m_critical: 25.0

  # ---------------------------------------------------------------------------
  # ПЕРЕКОС СТАКАНА (ORDER BOOK IMBALANCE)
  # Если покупателей сильно больше чем продавцов (или наоборот)
  # Значения от 0 до 1, где 0.5 = баланс, 1.0 = все в одну сторону
  # ---------------------------------------------------------------------------

  # 55% заявок в одну сторону — лёгкий перекос
  imbalance_warning: 0.55

  # 75% заявок в одну сторону — сильный перекос, кто-то давит рынок
  imbalance_alert: 0.75

  # ---------------------------------------------------------------------------
  # СПРЕД (разница между лучшей покупкой и продажей)
  # Большой спред = низкая ликвидность = легко манипулировать
  # ---------------------------------------------------------------------------

  # Спред больше 2% — широкий, подозрительно
  spread_warning: 2.0

  # Спред больше 3% — очень широкий, явный признак низкой ликвидности
  spread_critical: 3.0

  # ---------------------------------------------------------------------------
  # WASH TRADING (фиктивные сделки)
  # Когда один и тот же игрок торгует сам с собой для накрутки объёма
  # Признак: много сделок одинакового размера
  # ---------------------------------------------------------------------------

  # 25% сделок одинакового размера — подозрительно
  wash_trade_threshold: 0.25

  # 50% сделок одинакового размера — скорее всего wash trading
  wash_trade_critical: 0.50

  # ---------------------------------------------------------------------------
  # КООРДИНИРОВАННЫЕ ПОКУПКИ/ПРОДАЖИ
  # Когда почти все сделки идут в одну сторону — кто-то "гонит" цену
  # ---------------------------------------------------------------------------

  # 80% сделок — покупки (или продажи) — координированная атака
  coordinated_buy_threshold: 0.80

  # 90% сделок в одну сторону — почти наверняка манипуляция
  coordinated_extreme: 0.90

  # ---------------------------------------------------------------------------
  # RAPID FIRE (очень частые сделки)
  # Когда сделки идут с интервалом в миллисекунды — это боты
  # ---------------------------------------------------------------------------

  # Сделки чаще чем раз в 20 мс — точно бот
  rapid_fire_alert_ms: 20.0

  # Сделки чаще чем раз в 50 мс — высокочастотная торговля
  rapid_fire_warning_ms: 50.0

  # ---------------------------------------------------------------------------
  # КОМПЛЕКСНАЯ ДЕТЕКЦИЯ ПАМПА
  # Когда несколько признаков совпадают — это точно памп
  # ---------------------------------------------------------------------------

  # Объём вырос минимум в 10 раз
  pump_volume_multiplier: 10.0

  # Цена выросла минимум на 15%
  pump_price_change: 15.0

  # Стакан перекошен минимум на 50%
  pump_imbalance: 0.50

  # 80% сделок — покупки
  pump_one_sided: 0.80

  # ---------------------------------------------------------------------------
  # ДЕДУПЛИКАЦИЯ (чтобы не спамить одинаковыми алертами)
  # Минимальный интервал между повторными алертами того же типа
  # ---------------------------------------------------------------------------

  # CRITICAL алерты
  dedup_critical_sec: 30

  # ALERT
  dedup_alert_sec: 30

  # WARNING
  dedup_warning_sec: 30

  # Остальные
  dedup_default_sec: 30

  # ---------------------------------------------------------------------------
  # МИНИМУМ ДАННЫХ ДЛЯ АНАЛИЗА
  # Сколько сделок нужно собрать прежде чем анализировать паттерны
  # ---------------------------------------------------------------------------

  # Минимум 20 сделок для анализа паттернов (wash trading и т.д.)
  min_trades_for_pattern: 20


# =============================================================================
# ДЕТЕКЦИЯ НА ФЬЮЧЕРСАХ (Open Interest, Funding Rate, Long/Short)
# =============================================================================
# Фьючерсы дают данные которых нет на споте — это "рентген" для китов
# =============================================================================
futures:

  # ---------------------------------------------------------------------------
  # OPEN INTEREST (общий объём открытых позиций)
  # Если OI растёт — кто-то набирает позицию. Киты готовятся к движению.
  # ---------------------------------------------------------------------------

  # OI вырос на 10% за час — кто-то накапливает позицию
  oi_spike_warning: 10.0

  # OI вырос на 20% за час — серьёзное накопление
  oi_spike_alert: 20.0

  # OI вырос на 30% за час — киты явно что-то готовят, памп близко
  oi_spike_critical: 30.0

  # ---------------------------------------------------------------------------
  # ПАДЕНИЕ OPEN INTEREST
  # Если OI резко падает — киты закрывают позиции, возможен дамп
  # ---------------------------------------------------------------------------

  # OI упал на 8% за 5 минут — начали выходить из позиций
  oi_drop_warning: -8.0

  # OI упал на 12% за 5 минут — массовый выход, возможен дамп
  oi_drop_alert: -12.0

  # ---------------------------------------------------------------------------
  # FUNDING RATE (плата за удержание позиции)
  # Положительный = лонги платят шортам (много лонгов)
  # Отрицательный = шорты платят лонгам (много шортов)
  # ---------------------------------------------------------------------------

  # Funding > 0.05% — лонги переплачивают, рынок перегрет вверх
  # Риск коррекции вниз
  funding_extreme_positive: 0.05

  # Funding < -0.03% — шорты переплачивают, лонги дешёвые
  # Часто предвестник пампа! Умные деньги набирают лонги дёшево
  funding_extreme_negative: -0.03

  # ---------------------------------------------------------------------------
  # ГРАДИЕНТ FUNDING (как быстро меняется)
  # Резкое изменение = толпа массово входит в позиции
  # ---------------------------------------------------------------------------

  # Funding изменился на 0.03% за 3 периода — толпа ломится в одну сторону
  funding_gradient_threshold: 0.03

  # ---------------------------------------------------------------------------
  # LONG/SHORT RATIO (соотношение лонгов и шортов)
  # Показывает настроение толпы. Толпа обычно ошибается!
  # ---------------------------------------------------------------------------

  # >70% аккаунтов в лонгах — все бычат, скоро коррекция
  ls_extremely_long: 70.0

  # >55% аккаунтов в шортах — все медведят, возможен short squeeze (памп)
  # Порог ниже т.к. рынок обычно бычий
  ls_extremely_short: 55.0

  # ---------------------------------------------------------------------------
  # ДИВЕРГЕНЦИЯ OI И ЦЕНЫ
  # Когда цена и OI идут в разные стороны — важный сигнал
  # ---------------------------------------------------------------------------

  # Цена изменилась больше чем на 1%
  divergence_price_threshold: 1.0

  # OI изменился больше чем на 2%
  divergence_oi_threshold: 2.0
  #
  # Примеры:
  # - Цена ↑ + OI ↓ = слабый памп (шорты закрываются, новых покупок нет)
  # - Цена ↓ + OI ↓ = дамп выдыхается (лонги ликвидированы)

  # ---------------------------------------------------------------------------
  # ДЕТЕКТОР ТИХОГО НАКОПЛЕНИЯ (Stealth Accumulation)
  # Когда кит набирает позицию незаметно: цена стоит, а OI растёт
  # ---------------------------------------------------------------------------

  # Цена изменилась меньше чем на 2% за час (стоит на месте)
  accumulation_price_range: 2.0

  # Но OI вырос больше чем на 5% (кто-то набирает)
  accumulation_oi_growth: 5.0

  # И funding нейтральный (толпа не в курсе) — между -0.01% и +0.01%
  accumulation_funding_min: -0.01
  accumulation_funding_max: 0.01
  #
  # Если все условия выполнены — кит тихо набирает позицию, памп скоро!

  # ---------------------------------------------------------------------------
  # ДЕДУПЛИКАЦИЯ ФЬЮЧЕРСНЫХ АЛЕРТОВ
  # ---------------------------------------------------------------------------

  # OI детекции
  dedup_oi_sec: 30

  # Funding детекции
  dedup_funding_sec: 30

  # Long/Short детекции
  dedup_ls_sec: 30

  # Дивергенция
  dedup_divergence_sec: 30

  # Накопление
  dedup_accumulation_sec: 30

  # ---------------------------------------------------------------------------
  # КАК ЧАСТО ОБНОВЛЯТЬ ДАННЫЕ
  # ---------------------------------------------------------------------------

  # Open Interest: каждую минуту (меняется быстро)
  oi_update_interval_sec: 60

  # Funding Rate: каждые 5 минут (меняется редко)
  funding_update_interval_sec: 300

  # Long/Short Ratio: каждые 5 минут
  ls_ratio_update_interval_sec: 300

  # ---------------------------------------------------------------------------
  # ВЕСА ДЛЯ РАСЧЁТА "PUMP RISK SCORE" (0-100)
  # Чем выше score — тем вероятнее памп
  # ---------------------------------------------------------------------------

  # OI вырос больше 15% = +30 к score
  pump_risk_oi_high: 30

  # OI вырос больше 10% = +20 к score
  pump_risk_oi_medium: 20

  # Funding отрицательный (лонги дешёвые) = +25 к score
  pump_risk_funding_neg: 25

  # Толпа в шортах (>55%) = +30 к score (short squeeze setup)
  pump_risk_crowd_bearish: 30

  # OI восстанавливается после падения = +15 к score
  pump_risk_recovery: 15


# =============================================================================
# ФИЛЬТР УЯЗВИМЫХ ПАР (ФЬЮЧЕРСЫ)
# =============================================================================
# ЦЕЛЕВОЙ ДИАПАЗОН: ФЬЮЧЕРСНЫЕ пары с оборотом $10M - $50M USD/день
#
# АУДИТ ФЬЮЧЕРСОВ: 2026-02-17
# API: https://fapi.binance.com/fapi/v1/ticker/24hr
# - Всего USDT фьючерсных пар: 635
# - ТОП монеты исключены (>$50M): 70
# - После исключений в диапазоне $10M-$50M: 116 пар
# - Выборка для статистики: 25 пар (с валидными данными)
#
# СТАТИСТИКА ФЬЮЧЕРСОВ:
# - median_futures_volume: $29.0M
# - median_depth (±2%): $894K
# - median_spread: 0.034%
# - median_trades: 290K
#
# ВАЖНО: Фьючерсы имеют ЛУЧШУЮ ликвидность чем спот:
# - Глубина стакана в ~3.5 раза больше
# - Спреды в ~3 раза уже
# =============================================================================
filter:

  # ---------------------------------------------------------------------------
  # ФИЛЬТР ПО ФЬЮЧЕРСНОМУ ОБЪЁМУ (дневной оборот в USD)
  # ---------------------------------------------------------------------------

  # Максимальный объём: $60 млн в день (50M + 20%)
  # Выше — слишком ликвидно для манипуляций (BTC, ETH, SOL и др.)
  max_volume_usd: 150000000.0

  # Минимальный объём: $4 млн в день (5M - 20%)
  # Всё что между $4-60M - мониторим
  min_volume_usd: 50000000.0

  # ---------------------------------------------------------------------------
  # ГЛУБИНА СТАКАНА (ФЬЮЧЕРСЫ)
  # Сколько денег нужно чтобы сдвинуть цену на 2%
  # АУДИТ: min=$75K (TRUTH), median=$894K, max=$5.5M (APT)
  # ---------------------------------------------------------------------------

  # Максимум $500M чтобы сдвинуть на 2%
  # ОТКЛЮЧЕНО: мониторим все монеты по объёму, не фильтруем по глубине
  max_depth_usd: 500000000.0

  # ---------------------------------------------------------------------------
  # МИНИМАЛЬНЫЙ СПРЕД (ФЬЮЧЕРСЫ)
  # АУДИТ: min=0.006% (XLM), median=0.034%, max=0.088% (ARB)
  # ---------------------------------------------------------------------------

  # Спред минимум 0% — НЕ фильтруем по спреду
  # Мониторим все монеты в диапазоне объёма $4-60M
  min_spread_pct: 0.0

  # ---------------------------------------------------------------------------
  # КОЛИЧЕСТВО СДЕЛОК В ДЕНЬ (ФЬЮЧЕРСЫ)
  # АУДИТ: min=96K, median=291K, max=1.25M
  # ---------------------------------------------------------------------------

  # Максимум 100M сделок (не ограничиваем)
  max_trade_count: 100000000

  # Минимум 100 сделок (только чтобы отсечь мёртвые пары)
  min_trade_count: 100

  # ---------------------------------------------------------------------------
  # УРОВНИ УЯЗВИМОСТИ ПО ГЛУБИНЕ СТАКАНА (ФЬЮЧЕРСЫ)
  # АУДИТ: TRUTH=$75K, TAKE=$100K, BTR=$127K, median=$894K
  # ---------------------------------------------------------------------------

  # ОТКЛЮЧЕНО - все монеты получают уровень MEDIUM или выше
  # Фильтрация ТОЛЬКО по объёму $4-60M
  depth_critical: 1000000.0      # $1M = CRITICAL
  depth_high: 10000000.0         # $10M = HIGH
  depth_medium: 500000000.0      # $500M = MEDIUM (все попадают)

  # ---------------------------------------------------------------------------
  # УРОВНИ УЯЗВИМОСТИ ПО СПРЕДУ (ФЬЮЧЕРСЫ)
  # АУДИТ: median=0.034%, max=0.088%
  # ---------------------------------------------------------------------------

  # Спред > 0.07% = HIGH
  spread_critical: 0.07

  # Спред > 0.04% = MEDIUM (около median)
  spread_high: 0.04

  # Спред > 0.02% = LOW
  spread_elevated: 0.02

  # ---------------------------------------------------------------------------
  # УРОВНИ УЯЗВИМОСТИ ПО ФЬЮЧЕРСНОМУ ОБЪЁМУ
  # АУДИТ: диапазон $5M-$50M (расширен для "тихих" пампов)
  # ---------------------------------------------------------------------------

  # Объём < $10M = HIGH уязвимость (как JTO до пампа)
  volume_very_low: 10000000.0

  # Объём < $20M = MEDIUM уязвимость
  volume_low: 20000000.0

  # ---------------------------------------------------------------------------
  # УРОВНИ УЯЗВИМОСТИ ПО КОЛИЧЕСТВУ СДЕЛОК (ФЬЮЧЕРСЫ)
  # АУДИТ: median=291K
  # ---------------------------------------------------------------------------

  # Меньше 87K сделок = MEDIUM (median * 0.3)
  trades_few: 87000

  # Меньше 230K сделок = LOW (median * 0.8)
  trades_low: 230000

  # ---------------------------------------------------------------------------
  # МИНИМАЛЬНЫЙ УРОВЕНЬ ДЛЯ МОНИТОРИНГА
  # 0=NONE, 1=LOW, 2=MEDIUM, 3=HIGH, 4=CRITICAL
  # ---------------------------------------------------------------------------

  # Мониторим только пары с уязвимостью MEDIUM и выше
  min_vulnerability_level: 2

  # ---------------------------------------------------------------------------
  # ИСКЛЮЧЁННЫЕ МОНЕТЫ (только топ + стейблы + wrapped)
  # Мониторим ВСЁ остальное с объёмом $4-60M
  # ---------------------------------------------------------------------------
  excluded_base_assets:
    # === ТОП-10 по капитализации ===
    - BTC
    - ETH
    - BNB
    - XRP
    - SOL
    - ADA
    - DOGE
    - AVAX
    - LINK
    - DOT
    # === СТЕЙБЛКОИНЫ ===
    - USDT
    - USDC
    - BUSD
    - TUSD
    - DAI
    - FDUSD
    - USDP
    - USDD
    # === WRAPPED ===
    - WBTC
    - WETH
    - WBNB


# =============================================================================
# WEBSOCKET ПОДКЛЮЧЕНИЕ
# =============================================================================
# Настройки подключения к Binance для получения данных в реальном времени
# =============================================================================
websocket:

  # ---------------------------------------------------------------------------
  # URL-ы BINANCE API
  # ---------------------------------------------------------------------------

  # WebSocket для стриминга данных (трейды, стакан, свечи)
  ws_url: "wss://stream.binance.com:9443/stream"

  # REST API для исторических данных
  rest_url: "https://api.binance.com"

  # Futures API
  futures_url: "https://fapi.binance.com"

  # ---------------------------------------------------------------------------
  # ЛИМИТЫ ПОДКЛЮЧЕНИЯ
  # ---------------------------------------------------------------------------

  # Максимум стримов на одно WebSocket соединение (лимит Binance = 200)
  max_streams_per_connection: 200

  # ---------------------------------------------------------------------------
  # ПЕРЕПОДКЛЮЧЕНИЕ ПРИ ОБРЫВЕ
  # ---------------------------------------------------------------------------

  # Задержка перед переподключением (секунды)
  reconnect_delay_sec: 5

  # Максимум попыток переподключения
  max_reconnect_attempts: 10

  # ---------------------------------------------------------------------------
  # PING/PONG (проверка что соединение живое)
  # ---------------------------------------------------------------------------

  # Отправлять ping каждые N секунд
  ping_interval_sec: 20

  # Ждать pong максимум N секунд
  ping_timeout_sec: 10

  # Таймаут закрытия соединения
  close_timeout_sec: 5

  # ---------------------------------------------------------------------------
  # ПРОГРЕВ BASELINE (начальная загрузка истории)
  # ---------------------------------------------------------------------------

  # Сколько минутных свечей загрузить при старте (60 = 1 час истории)
  # Нужно для расчёта "среднего объёма" и детекции всплесков
  warmup_klines: 60

  # Сколько пар грузить параллельно при прогреве
  warmup_concurrent: 10


# =============================================================================
# ОСНОВНЫЕ НАСТРОЙКИ СКРИНЕРА
# =============================================================================
screener:

  # Как часто пересканировать биржу на новые уязвимые пары (секунды)
  # 300 = каждые 5 минут
  rescan_interval_sec: 300

  # Максимум пар для одновременного мониторинга
  # Увеличено для мониторинга всех монет с объёмом $4-60M
  max_monitored_symbols: 300


# =============================================================================
# TELEGRAM УВЕДОМЛЕНИЯ
# =============================================================================
# Credentials (bot_token, chat_id) храни в отдельном файле: config/telegram.json
# =============================================================================
telegram:

  # Минимальный уровень алерта для отправки в Telegram
  # INFO — всё подряд (много спама)
  # WARNING — подозрительные паттерны
  # ALERT — вероятные манипуляции
  # CRITICAL — почти 100% манипуляция прямо сейчас
  min_severity: "ALERT"  # Только ALERT и CRITICAL (не WARNING!)

  # Максимум сообщений в минуту (защита от спама)
  max_messages_per_minute: 10

  # ===== БАТЧИНГ (группировка алертов) =====
  # Группировать алерты в одно сообщение
  batch_enabled: true

  # Максимум алертов в одном сообщении
  batch_size: 5

  # Отправлять пачку каждые N секунд (даже если не набралось batch_size)
  batch_interval_sec: 30

  # Минимальный интервал между сообщениями (секунды)
  min_interval_sec: 10

  # Отправлять сообщение при запуске скринера
  send_startup_message: true

  # Отправлять сообщение при остановке скринера
  send_shutdown_message: true


# =============================================================================
# ДИСПЕТЧЕР АЛЕРТОВ (отправка в Binance API)
# =============================================================================
# API credentials (когда Binance предоставит) храни в отдельном файле
# =============================================================================
dispatcher:

  # Минимальный уровень для отправки в API
  min_severity: "WARNING"

  # Группировать алерты в пачки по N штук
  batch_size: 10

  # Отправлять пачку каждые N секунд (даже если не набралось batch_size)
  batch_interval_sec: 5

  # Сколько раз пытаться отправить при ошибке
  max_retries: 3

  # Пауза между попытками (секунды)
  retry_delay_sec: 2

  # Сохранять копию всех алертов в локальный файл
  log_to_file: true

  # Путь к файлу с логом алертов (JSON Lines формат)
  log_file_path: "logs/alerts.jsonl"


# =============================================================================
# RATE LIMITING (защита от бана на бирже)
# =============================================================================
# Binance банит за слишком частые запросы — эти настройки защищают
# =============================================================================
rate_limit:

  # ---------------------------------------------------------------------------
  # FUTURES API
  # ---------------------------------------------------------------------------

  # Максимум параллельных запросов к Futures API
  futures_max_concurrent: 5

  # Пауза между запросами (секунды). 0.2 = 200мс = 5 запросов/сек
  futures_request_delay_sec: 0.2

  # ---------------------------------------------------------------------------
  # SPOT API (используется для depth в vulnerability_filter)
  # ---------------------------------------------------------------------------

  # Максимум параллельных запросов (для проверки стакана)
  # ВАЖНО: Binance лимит ~10 req/sec, ставим 3 чтобы не получать 429
  spot_max_concurrent: 3

  # Пауза между запросами к Spot API (секунды)
  spot_request_delay_sec: 0.3

  # ---------------------------------------------------------------------------
  # ТАЙМАУТЫ
  # ---------------------------------------------------------------------------

  # Общий таймаут на запрос (секунды)
  request_timeout_sec: 30

  # Короткий таймаут для быстрых запросов
  short_timeout_sec: 10

  # Длинный таймаут для тяжёлых запросов
  long_timeout_sec: 15


# =============================================================================
# ЛОГИРОВАНИЕ
# =============================================================================
logging:

  # Уровень логов: DEBUG (всё), INFO, WARNING, ERROR (только ошибки)
  level: "INFO"

  # Формат вывода: console (читаемый) или json (для парсинга)
  format: "console"

  # Путь к файлу логов
  file_path: "logs/screener.log"

  # Максимальный размер файла лога (MB), потом ротация
  max_size_mb: 100

  # Сколько старых логов хранить
  backup_count: 5


# =============================================================================
